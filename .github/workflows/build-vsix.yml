name: Build VSIX

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        description: Optional release tag to validate against package.json version
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release metadata
        id: release-metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          node scripts/validate-release-version.mjs
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "vsix_name=rawviewer-${version}.vsix" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      # vscode-test (Electron) はヘッドレス Linux で X サーバーを必要とするため
      # xvfb 経由で実行する。ubuntu-latest には通常 xvfb がプリインストール
      # されているが、ランナーイメージの変更に備えて防御的にインストールする。
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Test
        run: xvfb-run -a npm test

      - name: Package extension
        shell: bash
        run: |
          npx --yes @vscode/vsce package --no-yarn --out "${{ steps.release-metadata.outputs.vsix_name }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rawviewer-vsix
          path: ${{ steps.release-metadata.outputs.vsix_name }}
          if-no-files-found: error
