name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "copilot/**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package Extension
        run: npx @vscode/vsce package --no-git-tag-version --allow-missing-repository

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-rawimage-viewer-vsix
          path: "*.vsix"
          if-no-files-found: error
