name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v0.0.3
        required: true
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/build-vsix.yml
    with:
      release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    permissions:
      contents: read

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: rawviewer-vsix
          path: .

      - name: Create Release and Upload VSIX
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" rawviewer-*.vsix \
            --generate-notes \
            --target "$GITHUB_SHA"
